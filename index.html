<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Windows XP - Ultimate Web Edition</title>
    <style>
        :root {
            --xp-blue: #0058e4;
            --xp-taskbar: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #333 100%);
        }

        body {
            /* Fallback Farbe + Zuverlässiger Link für das XP Wallpaper */
            background-color: #004e98;
            background-image: url('https://raw.githubusercontent.com/BloopBleep-Bloop/windows-xp-web/master/img/bliss.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            user-select: none;
        }

        /* DESKTOP & ICONS */
        .desktop {
            height: calc(100vh - 30px);
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 20px;
        }

        .icon {
            width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 5px;
            border: 1px solid transparent;
        }

        .icon.selected {
            background-color: rgba(0, 0, 255, 0.3);
            border: 1px dotted rgba(255, 255, 255, 0.7);
        }

        .icon img {
            width: 32px;
            height: 32px;
            margin-bottom: 4px;
            pointer-events: none;
        }

        .icon span {
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 11px;
            text-align: center;
            background-color: transparent;
            padding: 2px;
        }

        .icon.selected span {
            background-color: #0b61ff;
        }

        /* FENSTER */
        .window {
            position: absolute;
            background: #ece9d8;
            border: 3px solid var(--xp-blue);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: none; 
            flex-direction: column;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: calc(100vh - 30px) !important;
            border-radius: 0;
            border: none;
        }

        .title-bar {
            background: linear-gradient(to bottom, #0058e4 0%, #3b8cf8 10%, #0058e4 100%);
            color: white;
            padding: 3px 5px 3px 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 25px;
            font-size: 13px;
        }

        .title-text {
            flex-grow: 1;
            cursor: default;
            height: 100%;
            display: flex;
            align-items: center;
        }

        .controls { display: flex; gap: 2px; }

        .controls button {
            width: 21px; height: 21px;
            border: 1px solid white; border-radius: 2px;
            color: white; font-weight: bold; font-size: 11px;
            cursor: pointer;
            background: linear-gradient(to bottom, #4a8df8, #1860e6);
            display: flex; justify-content: center; align-items: center;
        }
        .controls button:hover { filter: brightness(1.2); }
        .controls .btn-close { background: linear-gradient(to bottom, #e76d4e, #b53010); }

        .window-content {
            flex-grow: 1;
            background: white;
            margin: 2px;
            border: 1px solid #7f9db9;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* TASKLEISTE */
        .taskbar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 30px;
            background: var(--xp-taskbar);
            display: flex; align-items: center;
            z-index: 9999;
        }

        .start-button {
            background: linear-gradient(to bottom, #388e3c 0%, #4caf50 10%, #388e3c 90%, #1b5e20 100%);
            color: white; font-style: italic; font-weight: bold; font-size: 15px;
            padding: 0 15px; height: 100%; border: none;
            border-top-right-radius: 12px; border-bottom-right-radius: 12px;
            cursor: pointer; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.5);
            display: flex; align-items: center; gap: 5px;
        }
        .start-button:active { background: #2e7d32; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5); }

        /* Offene Programme in der Taskleiste */
        .taskbar-apps {
            display: flex; flex-grow: 1; padding: 0 10px; gap: 5px;
        }
        .task-btn {
            background: #3a78d8; color: white; border: 1px solid #0058e4;
            border-radius: 3px; padding: 0 10px; height: 24px;
            display: flex; align-items: center; gap: 5px; font-size: 11px;
            cursor: pointer; min-width: 100px; max-width: 150px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .task-btn.active {
            background: #1b52a1; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
        }

        .clock {
            background: #1290eb; color: white; padding: 0 15px; height: 100%;
            display: flex; align-items: center; font-size: 11px;
            border-left: 1px solid #0856b3; box-shadow: inset 1px 0px 2px rgba(255,255,255,0.3);
        }

        /* START MENU */
        #startMenu {
            position: fixed; bottom: 30px; left: 0; width: 300px;
            background: white; border-top-left-radius: 5px; border-top-right-radius: 5px;
            box-shadow: 2px -2px 10px rgba(0,0,0,0.3); display: none; z-index: 10000;
            border: 1px solid #0058e4; border-bottom: none;
        }
        .start-header {
            background: linear-gradient(to bottom, #1d5ba5, #4388e6);
            color: white; padding: 10px; font-weight: bold; font-size: 14px;
        }
        .start-item {
            padding: 10px; display: flex; align-items: center; cursor: pointer;
            font-size: 13px; color: #333; gap: 10px;
        }
        .start-item:hover { background: #316ac5; color: white; }

        /* Rechner Design */
        .calc-btn { background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px; padding: 10px 0; cursor: pointer; font-family: Tahoma; }
        .calc-btn:active { background: #ddd; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body id="body">

<div class="desktop" id="desktop">
    <div class="icon" data-app="dinoWin" data-title="Dino Game" data-icon="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png">
        <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png">
        <span>Dino Game</span>
    </div>
    <div class="icon" data-app="calcWin" data-title="Rechner" data-icon="https://win98icons.alexmeub.com/icons/png/calculator-0.png">
        <img src="https://win98icons.alexmeub.com/icons/png/calculator-0.png">
        <span>Rechner</span>
    </div>
    <div class="icon" data-app="musicWin" data-title="Media Player" data-icon="https://win98icons.alexmeub.com/icons/png/cd_audio_cd_a-4.png">
        <img src="https://win98icons.alexmeub.com/icons/png/cd_audio_cd_a-4.png">
        <span>Musik</span>
    </div>
    <div class="icon" data-app="ieWin" data-title="Internet" data-icon="https://win98icons.alexmeub.com/icons/png/msie1-0.png">
        <img src="https://win98icons.alexmeub.com/icons/png/msie1-0.png">
        <span>Internet</span>
    </div>
</div>

<div class="window" id="dinoWin" style="width:600px; height:400px; top:50px; left:50px;">
    <div class="title-bar">
        <div class="title-text">🦖 Dino Game</div>
        <div class="controls">
            <button onclick="minimizeApp('dinoWin')">_</button>
            <button onclick="toggleMax('dinoWin')">□</button>
            <button class="btn-close" onclick="closeApp('dinoWin')">X</button>
        </div>
    </div>
    <div class="window-content"><iframe src="https://offline-dino-game.firebaseapp.com/"></iframe></div>
</div>

<div class="window" id="calcWin" style="width:250px; height:320px; top:100px; left:200px;">
    <div class="title-bar">
        <div class="title-text">🔢 Rechner</div>
        <div class="controls">
            <button onclick="minimizeApp('calcWin')">_</button>
            <button class="btn-close" onclick="closeApp('calcWin')">X</button>
        </div>
    </div>
    <div class="window-content" style="padding:15px; background:#ece9d8;">
        <input type="text" id="calcDisplay" style="width:calc(100% - 12px); margin-bottom:15px; text-align:right; padding:5px; font-size:16px;" readonly>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px;">
            <button class="calc-btn" onclick="calcInput('7')">7</button><button class="calc-btn" onclick="calcInput('8')">8</button><button class="calc-btn" onclick="calcInput('9')">9</button><button class="calc-btn" onclick="calcInput('/')">/</button>
            <button class="calc-btn" onclick="calcInput('4')">4</button><button class="calc-btn" onclick="calcInput('5')">5</button><button class="calc-btn" onclick="calcInput('6')">6</button><button class="calc-btn" onclick="calcInput('*')">*</button>
            <button class="calc-btn" onclick="calcInput('1')">1</button><button class="calc-btn" onclick="calcInput('2')">2</button><button class="calc-btn" onclick="calcInput('3')">3</button><button class="calc-btn" onclick="calcInput('-')">-</button>
            <button class="calc-btn" onclick="calcClear()">C</button><button class="calc-btn" onclick="calcInput('0')">0</button><button class="calc-btn" onclick="calcEval()">=</button><button class="calc-btn" onclick="calcInput('+')">+</button>
        </div>
    </div>
</div>

<div class="window" id="musicWin" style="width:400px; height:150px; top:150px; left:300px;">
    <div class="title-bar">
        <div class="title-text">🎵 Media Player</div>
        <div class="controls">
            <button onclick="minimizeApp('musicWin')">_</button>
            <button class="btn-close" onclick="closeApp('musicWin')">X</button>
        </div>
    </div>
    <div class="window-content" style="padding:20px; text-align:center;">
        <p>Lofi Beats</p>
        <audio controls style="width:100%;"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    </div>
</div>

<div class="window" id="ieWin" style="width:700px; height:500px; top:30px; left:100px;">
    <div class="title-bar">
        <div class="title-text">🌐 Internet Explorer</div>
        <div class="controls">
            <button onclick="minimizeApp('ieWin')">_</button>
            <button onclick="toggleMax('ieWin')">□</button>
            <button class="btn-close" onclick="closeApp('ieWin')">X</button>
        </div>
    </div>
    <div class="window-content"><iframe src="https://de.wikipedia.org/wiki/Windows_XP"></iframe></div>
</div>

<div id="startMenu">
    <div class="start-header">Admin</div>
    <div class="start-item" onclick="openApp('calcWin', 'Rechner', 'https://win98icons.alexmeub.com/icons/png/calculator-0.png')">
        <img src="https://win98icons.alexmeub.com/icons/png/calculator-0.png" width="24"> Rechner
    </div>
    <div class="start-item" onclick="location.reload()">
        <img src="https://win98icons.alexmeub.com/icons/png/shut_down_cool-5.png" width="24"> Neustarten
    </div>
</div>

<div class="taskbar">
    <button class="start-button" id="startBtn">
        <img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16"> start
    </button>
    <div class="taskbar-apps" id="taskbarApps"></div>
    <div class="clock" id="clock">12:00</div>
</div>

<script>
    let highestZ = 100;
    const openApps = new Set(); // Merkt sich, welche Programme offen sind

    // --- DESKTOP ICONS LOGIK (1 Klick markieren, 2 Klicks öffnen) ---
    document.querySelectorAll('.icon').forEach(icon => {
        icon.addEventListener('click', (e) => {
            e.stopPropagation(); // Verhindert, dass der Klick den Desktop erreicht
            document.querySelectorAll('.icon').forEach(i => i.classList.remove('selected'));
            icon.classList.add('selected');
        });

        icon.addEventListener('dblclick', () => {
            const appId = icon.getAttribute('data-app');
            const title = icon.getAttribute('data-title');
            const imgSrc = icon.getAttribute('data-icon');
            openApp(appId, title, imgSrc);
        });
    });

    // Klick ins Leere hebt Markierung auf und schließt Startmenü
    document.getElementById('desktop').addEventListener('click', () => {
        document.querySelectorAll('.icon').forEach(i => i.classList.remove('selected'));
        document.getElementById('startMenu').style.display = 'none';
    });

    // --- FENSTER LOGIK ---
    function openApp(id, title, iconSrc) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        document.getElementById('startMenu').style.display = 'none'; // Startmenü schließen
        
        focusWin(win);

        // Taskleisten-Tab erstellen, falls er noch nicht existiert
        if (!openApps.has(id)) {
            openApps.add(id);
            const taskbarApps = document.getElementById('taskbarApps');
            const btn = document.createElement('div');
            btn.className = 'task-btn active';
            btn.id = 'taskbtn-' + id;
            btn.innerHTML = `<img src="${iconSrc}" width="16" height="16"> ${title}`;
            btn.onclick = () => toggleFromTaskbar(id);
            taskbarApps.appendChild(btn);
        }
        updateTaskbarActive(id);
    }

    function closeApp(id) {
        document.getElementById(id).style.display = 'none';
        document.getElementById(id).classList.remove('maximized');
        openApps.delete(id);
        
        // Tab aus Taskleiste löschen
        const btn = document.getElementById('taskbtn-' + id);
        if(btn) btn.remove();
    }

    function minimizeApp(id) {
        document.getElementById(id).style.display = 'none';
        document.getElementById('taskbtn-' + id).classList.remove('active');
    }

    function toggleFromTaskbar(id) {
        const win = document.getElementById(id);
        if (win.style.display === 'none') {
            win.style.display = 'flex';
            focusWin(win);
            updateTaskbarActive(id);
        } else {
            // Wenn es schon offen ist, minimieren
            minimizeApp(id);
        }
    }

    function toggleMax(id) {
        const win = document.getElementById(id);
        win.classList.toggle('maximized');
        focusWin(win);
    }

    function focusWin(win) {
        highestZ++;
        win.style.zIndex = highestZ;
        updateTaskbarActive(win.id);
    }

    function updateTaskbarActive(activeId) {
        document.querySelectorAll('.task-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById('taskbtn-' + activeId);
        if(activeBtn) activeBtn.classList.add('active');
    }

    // Beim Klick irgendwo ins Fenster -> Fokus
    document.querySelectorAll('.window').forEach(win => {
        win.addEventListener('mousedown', () => focusWin(win));
    });

    // --- DRAG & DROP LOGIK (Jetzt zu 100% bugfrei!) ---
    let dragElement = null, offsetX = 0, offsetY = 0;

    document.querySelectorAll('.title-text').forEach(titleBar => {
        titleBar.addEventListener('mousedown', (e) => {
            const win = titleBar.parentElement.parentElement;
            if (win.classList.contains('maximized')) return;
            
            dragElement = win;
            focusWin(win);
            offsetX = e.clientX - win.offsetLeft;
            offsetY = e.clientY - win.offsetTop;
        });
    });

    document.addEventListener('mousemove', (e) => {
        if (dragElement) {
            dragElement.style.left = (e.clientX - offsetX) + 'px';
            dragElement.style.top = (e.clientY - offsetY) + 'px';
        }
    });

    document.addEventListener('mouseup', () => { dragElement = null; });

    // --- STARTMENÜ ---
    document.getElementById('startBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        const menu = document.getElementById('startMenu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    });

    // --- RECHNER ---
    const disp = document.getElementById('calcDisplay');
    function calcInput(v) { disp.value += v; }
    function calcClear() { disp.value = ''; }
    function calcEval() { try { disp.value = eval(disp.value); } catch { disp.value = 'Fehler'; } }

    // --- UHR ---
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = 
            String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0');
    }, 1000);
</script>

</body>
</html>
