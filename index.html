<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Windows XP - KI Edition</title>
    <style>
        :root {
            --xp-blue: #245edb;
            --xp-taskbar: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #333 100%);
            --xp-start: linear-gradient(to bottom, #388e3c 0%, #4caf50 10%, #388e3c 90%, #1b5e20 100%);
        }

        body {
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/21/Wallpaper_Bliss.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Tahoma', 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            user-select: none;
        }

        /* DESKTOP */
        .desktop {
            height: calc(100vh - 30px);
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 75px);
            grid-template-rows: repeat(auto-fill, 75px);
            grid-auto-flow: column;
            gap: 15px;
        }

        .icon {
            width: 75px;
            height: 75px;
            text-align: center;
            cursor: pointer;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 11px;
        }

        .icon img {
            width: 32px;
            height: 32px;
            display: block;
            margin: 0 auto 5px;
        }

        .icon:hover { background: rgba(255,255,255,0.2); border-radius: 3px; }

        /* WINDOWS */
        .window {
            position: absolute;
            background: #ece9d8;
            border: 3px solid var(--xp-blue);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            display: none; /* Startet versteckt */
            flex-direction: column;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .title-bar {
            background: linear-gradient(to bottom, #0058e4 0%, #3b8cf8 10%, #0058e4 100%);
            color: white;
            padding: 3px 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            height: 25px;
        }

        .controls button {
            width: 21px;
            height: 21px;
            border: 1px solid white;
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            border-radius: 2px;
        }

        .btn-close { background: linear-gradient(to bottom, #e76d4e, #b53010); }

        .window-content {
            flex-grow: 1;
            background: white;
            margin: 2px;
            border: 1px solid #7f9db9;
            overflow: hidden;
        }

        /* TASKBAR */
        .taskbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 30px;
            background: var(--xp-taskbar);
            display: flex;
            align-items: center;
            z-index: 9999;
        }

        .start-button {
            background: var(--xp-start);
            color: white;
            font-style: italic;
            font-weight: bold;
            font-size: 15px;
            padding: 0 15px;
            height: 100%;
            border: none;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            cursor: pointer;
        }

        .clock {
            margin-left: auto;
            background: #1290eb;
            color: white;
            padding: 0 10px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 11px;
            border-left: 1px solid #0856b3;
        }

        /* START MENU */
        #startMenu {
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 300px;
            background: white;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            box-shadow: 2px -2px 10px rgba(0,0,0,0.3);
            display: none;
            z-index: 10000;
        }

        .start-header {
            background: linear-gradient(to bottom, #1d5ba5, #4388e6);
            color: white;
            padding: 10px;
            font-weight: bold;
        }

        .start-item {
            padding: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .start-item:hover { background: #316ac5; color: white; }
    </style>
</head>
<body>

<div class="desktop">
    <div class="icon" onclick="openApp('kiWin')">
        <img src="https://lh3.googleusercontent.com/u/0/d/13UK7qNSLeyCp-DrSO895B5jM6XjpKJmf" alt="KI">
        <span>KI Assistent</span>
    </div>
    <div class="icon" onclick="openApp('dinoWin')">
        <img src="https://win98icons.alexmeub.com/icons/png/game_solitaire-0.png" alt="Game">
        <span>Dino Game</span>
    </div>
    <div class="icon" onclick="openApp('calcWin')">
        <img src="https://win98icons.alexmeub.com/icons/png/calculator-0.png" alt="Calc">
        <span>Rechner</span>
    </div>
    <div class="icon" onclick="openApp('musicWin')">
        <img src="https://win98icons.alexmeub.com/icons/png/cd_audio_cd_a-4.png" alt="Music">
        <span>Musik</span>
    </div>
</div>

<div class="window" id="kiWin" style="width:600px; height:450px; top:50px; left:50px;">
    <div class="title-bar" onmousedown="dragInit(event, 'kiWin')">
        <span>🤖 KI Assistent Alpha</span>
        <div class="controls"><button class="btn-close" onclick="closeApp('kiWin')">X</button></div>
    </div>
    <div class="window-content">
        <iframe src="https://ki-assistent-alpha.vercel.app/" style="width:100%; height:100%; border:none;"></iframe>
    </div>
</div>

<div class="window" id="dinoWin" style="width:600px; height:400px; top:80px; left:80px;">
    <div class="title-bar" onmousedown="dragInit(event, 'dinoWin')">
        <span>🦖 Dinosaur Run</span>
        <div class="controls"><button class="btn-close" onclick="closeApp('dinoWin')">X</button></div>
    </div>
    <div class="window-content">
        <iframe src="https://offline-dino-game.firebaseapp.com/" style="width:100%; height:100%; border:none;"></iframe>
    </div>
</div>

<div class="window" id="calcWin" style="width:250px; height:350px; top:150px; left:400px;">
    <div class="title-bar" onmousedown="dragInit(event, 'calcWin')">
        <span>🔢 Rechner</span>
        <div class="controls"><button class="btn-close" onclick="closeApp('calcWin')">X</button></div>
    </div>
    <div class="window-content" style="padding:10px;">
        <input type="text" id="calcDisplay" style="width:100%; margin-bottom:10px; text-align:right;" readonly>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px;">
            <button onclick="calcInput('7')">7</button><button onclick="calcInput('8')">8</button><button onclick="calcInput('9')">9</button><button onclick="calcInput('/')">/</button>
            <button onclick="calcInput('4')">4</button><button onclick="calcInput('5')">5</button><button onclick="calcInput('6')">6</button><button onclick="calcInput('*')">*</button>
            <button onclick="calcInput('1')">1</button><button onclick="calcInput('2')">2</button><button onclick="calcInput('3')">3</button><button onclick="calcInput('-')">-</button>
            <button onclick="calcClear()">C</button><button onclick="calcInput('0')">0</button><button onclick="calcEval()">=</button><button onclick="calcInput('+')">+</button>
        </div>
    </div>
</div>

<div class="window" id="musicWin" style="width:400px; height:150px; top:300px; left:100px;">
    <div class="title-bar" onmousedown="dragInit(event, 'musicWin')">
        <span>🎵 Media Player</span>
        <div class="controls"><button class="btn-close" onclick="closeApp('musicWin')">X</button></div>
    </div>
    <div class="window-content" style="padding:20px; text-align:center;">
        <p>Lofi Beats zum Coden</p>
        <audio controls style="width:100%;">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>
</div>

<div id="startMenu">
    <div class="start-header"><img src="https://lh3.googleusercontent.com/u/0/d/13UK7qNSLeyCp-DrSO895B5jM6XjpKJmf" style="width:25px; border-radius:50%; vertical-align:middle;"> Admin</div>
    <div class="start-item" onclick="alert('Herunterfahren nicht möglich - das ist die Zukunft!')">💻 Ausschalten</div>
    <div class="start-item" onclick="location.reload()">🔄 Neustarten</div>
</div>

<div class="taskbar">
    <button class="start-button" onclick="toggleStart()">start</button>
    <div class="clock" id="clock">12:00</div>
</div>

<script>
    // FENSTER ÖFFNEN / SCHLIEẞEN
    function openApp(id) {
        const win = document.getElementById(id);
        win.style.display = 'flex';
        focusWin(win);
        toggleStart(true); // Schließt Startmenü falls offen
    }

    function closeApp(id) {
        document.getElementById(id).style.display = 'none';
    }

    function toggleStart(forceClose = false) {
        const menu = document.getElementById('startMenu');
        menu.style.display = (menu.style.display === 'block' || forceClose) ? 'none' : 'block';
    }

    function focusWin(win) {
        document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
        win.style.zIndex = 100;
    }

    // DRAG LOGIK
    let activeWin = null, offX = 0, offY = 0;

    function dragInit(e, id) {
        activeWin = document.getElementById(id);
        focusWin(activeWin);
        offX = e.clientX - activeWin.offsetLeft;
        offY = e.clientY - activeWin.offsetTop;
        document.onmousemove = dragMove;
        document.onmouseup = dragEnd;
    }

    function dragMove(e) {
        if (activeWin) {
            activeWin.style.left = (e.clientX - offX) + 'px';
            activeWin.style.top = (e.clientY - offY) + 'px';
        }
    }

    function dragEnd() { activeWin = null; }

    // RECHNER LOGIK
    const disp = document.getElementById('calcDisplay');
    function calcInput(v) { disp.value += v; }
    function calcClear() { disp.value = ''; }
    function calcEval() { try { disp.value = eval(disp.value); } catch { disp.value = 'Fehler'; } }

    // UHR
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
    }, 1000);
</script>

</body>
</html>
